<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>短视频</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: #000;
font-family: -apple-system, ‘PingFang SC’, ‘Helvetica Neue’, sans-serif;
overflow: hidden;
height: 100vh;
width: 100vw;
color: #fff;
}

#app {
position: relative;
width: 100%;
height: 100%;
overflow: hidden;
}

/* ── 视频容器 ── */
.feed {
height: 100%;
width: 100%;
position: relative;
}

.video-item {
position: absolute;
top: 0; left: 0;
width: 100%;
height: 100%;
display: flex;
align-items: center;
justify-content: center;
transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
will-change: transform;
}

.video-item video {
width: 100%;
height: 100%;
object-fit: cover;
background: #111;
}

/* ── 顶部导航 ── */
.top-nav {
position: fixed;
top: 0; left: 0; right: 0;
z-index: 100;
display: flex;
justify-content: center;
align-items: center;
gap: 24px;
padding: 16px 0 12px;
background: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, transparent 100%);
}

.nav-tab {
font-size: 16px;
color: rgba(255,255,255,0.6);
font-weight: 500;
cursor: pointer;
padding: 4px 0;
position: relative;
letter-spacing: 0.5px;
}

.nav-tab.active {
color: #fff;
font-weight: 700;
font-size: 17px;
}

.nav-tab.active::after {
content: ‘’;
position: absolute;
bottom: -4px;
left: 50%;
transform: translateX(-50%);
width: 20px;
height: 3px;
background: #fff;
border-radius: 2px;
}

/* ── 搜索图标 ── */
.top-search {
position: fixed;
top: 14px;
right: 16px;
z-index: 100;
}

.top-search svg { width: 24px; height: 24px; fill: #fff; }

/* ── 右侧操作栏 ── */
.action-bar {
position: fixed;
right: 12px;
bottom: 90px;
z-index: 100;
display: flex;
flex-direction: column;
align-items: center;
gap: 20px;
}

.action-btn {
display: flex;
flex-direction: column;
align-items: center;
gap: 4px;
cursor: pointer;
-webkit-tap-highlight-color: transparent;
}

.action-icon {
width: 48px;
height: 48px;
display: flex;
align-items: center;
justify-content: center;
position: relative;
}

.action-icon svg {
width: 32px;
height: 32px;
filter: drop-shadow(0 1px 3px rgba(0,0,0,0.5));
}

.action-label {
font-size: 12px;
color: #fff;
font-weight: 500;
text-shadow: 0 1px 3px rgba(0,0,0,0.6);
letter-spacing: 0.2px;
}

/* 点赞动画 */
.action-btn.liked .heart-icon {
animation: heartPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

@keyframes heartPop {
0% { transform: scale(1); }
40% { transform: scale(1.4); }
100% { transform: scale(1); }
}

/* 头像 */
.avatar-wrap {
position: relative;
width: 48px;
height: 48px;
margin-bottom: 4px;
}

.avatar {
width: 48px;
height: 48px;
border-radius: 50%;
border: 2px solid #fff;
object-fit: cover;
background: linear-gradient(135deg, #f093fb, #f5576c, #4facfe);
display: flex;
align-items: center;
justify-content: center;
font-size: 20px;
font-weight: 700;
color: #fff;
overflow: hidden;
}

.follow-btn {
position: absolute;
bottom: -8px;
left: 50%;
transform: translateX(-50%);
width: 20px;
height: 20px;
background: #fe2c55;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-size: 16px;
line-height: 1;
color: #fff;
font-weight: 300;
cursor: pointer;
box-shadow: 0 2px 6px rgba(254,44,85,0.5);
}

/* ── 底部信息 ── */
.video-info {
position: fixed;
left: 16px;
right: 80px;
bottom: 90px;
z-index: 100;
}

.video-username {
font-size: 16px;
font-weight: 700;
color: #fff;
margin-bottom: 8px;
text-shadow: 0 1px 4px rgba(0,0,0,0.4);
}

.video-desc {
font-size: 14px;
color: rgba(255,255,255,0.9);
line-height: 1.5;
margin-bottom: 10px;
text-shadow: 0 1px 3px rgba(0,0,0,0.4);
}

.video-desc .hashtag {
color: #69c9d0;
font-weight: 600;
}

/* 音乐滚动条 */
.music-row {
display: flex;
align-items: center;
gap: 8px;
}

.music-icon {
width: 16px;
height: 16px;
flex-shrink: 0;
}

.music-scroll {
flex: 1;
overflow: hidden;
white-space: nowrap;
position: relative;
}

.music-name {
font-size: 13px;
color: rgba(255,255,255,0.85);
display: inline-block;
animation: scrollText 8s linear infinite;
}

@keyframes scrollText {
0% { transform: translateX(0); }
40% { transform: translateX(-50%); }
50% { transform: translateX(-50%); }
90% { transform: translateX(0); }
100% { transform: translateX(0); }
}

/* ── 底部导航 ── */
.bottom-nav {
position: fixed;
bottom: 0; left: 0; right: 0;
height: 82px;
background: rgba(0,0,0,0.85);
backdrop-filter: blur(10px);
display: flex;
align-items: flex-start;
padding-top: 10px;
z-index: 100;
border-top: 0.5px solid rgba(255,255,255,0.08);
}

.nav-item {
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
gap: 3px;
cursor: pointer;
-webkit-tap-highlight-color: transparent;
}

.nav-item svg { width: 26px; height: 26px; }
.nav-item span {
font-size: 10px;
color: rgba(255,255,255,0.5);
font-weight: 500;
}
.nav-item.active span { color: #fff; }
.nav-item.active svg { fill: #fff; }

/* 中间发布按钮 */
.nav-plus {
flex: 1;
display: flex;
align-items: flex-start;
justify-content: center;
padding-top: 2px;
cursor: pointer;
}

.plus-btn {
width: 44px;
height: 30px;
position: relative;
display: flex;
align-items: center;
justify-content: center;
}

.plus-btn::before {
content: ‘’;
position: absolute;
left: -6px;
top: 0;
width: 32px;
height: 100%;
background: #69c9d0;
border-radius: 8px;
}

.plus-btn::after {
content: ‘’;
position: absolute;
right: -6px;
top: 0;
width: 32px;
height: 100%;
background: #fe2c55;
border-radius: 8px;
}

.plus-inner {
width: 36px;
height: 100%;
background: #fff;
border-radius: 6px;
display: flex;
align-items: center;
justify-content: center;
position: relative;
z-index: 1;
font-size: 22px;
color: #000;
font-weight: 300;
line-height: 1;
}

/* ── 飘心动画 ── */
.float-heart {
position: fixed;
right: 36px;
font-size: 32px;
pointer-events: none;
z-index: 200;
animation: floatUp 1s ease-out forwards;
}

@keyframes floatUp {
0%   { opacity: 1; transform: translateY(0) scale(0.8) rotate(-15deg); }
50%  { opacity: 1; transform: translateY(-80px) scale(1.2) rotate(10deg); }
100% { opacity: 0; transform: translateY(-160px) scale(0.6) rotate(-5deg); }
}

/* ── 播放暂停提示 ── */
.play-indicator {
position: fixed;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
z-index: 200;
pointer-events: none;
opacity: 0;
transition: opacity 0.2s;
}

.play-indicator.show {
opacity: 1;
animation: fadeOut 0.8s 0.3s forwards;
}

@keyframes fadeOut {
to { opacity: 0; }
}

.play-indicator svg {
width: 72px;
height: 72px;
filter: drop-shadow(0 2px 12px rgba(0,0,0,0.5));
}

/* ── 旋转唱片 ── */
.disc {
width: 40px;
height: 40px;
border-radius: 50%;
background: linear-gradient(135deg, #2d2d2d, #1a1a1a);
border: 3px solid #333;
position: relative;
animation: spin 4s linear infinite;
flex-shrink: 0;
overflow: hidden;
display: flex;
align-items: center;
justify-content: center;
}

.disc::after {
content: ‘’;
width: 12px;
height: 12px;
border-radius: 50%;
background: #1a1a1a;
border: 2px solid #444;
position: absolute;
}

@keyframes spin {
from { transform: rotate(0deg); }
to { transform: rotate(360deg); }
}

/* ── 滑动提示 ── */
.swipe-hint {
position: fixed;
bottom: 110px;
left: 50%;
transform: translateX(-50%);
z-index: 100;
display: flex;
flex-direction: column;
align-items: center;
gap: 4px;
opacity: 0.7;
animation: bounce 1.5s ease-in-out infinite;
}

@keyframes bounce {
0%, 100% { transform: translateX(-50%) translateY(0); }
50% { transform: translateX(-50%) translateY(-8px); }
}

.swipe-hint svg { width: 20px; height: 20px; fill: rgba(255,255,255,0.6); }
.swipe-hint span { font-size: 11px; color: rgba(255,255,255,0.5); }

/* 进度条 */
.progress-bar {
position: fixed;
bottom: 82px;
left: 0; right: 0;
height: 2px;
background: rgba(255,255,255,0.2);
z-index: 100;
}

.progress-fill {
height: 100%;
background: rgba(255,255,255,0.7);
width: 0%;
transition: width 0.2s linear;
}
</style>

</head>

<!-- Toast 提示 -->

<div id="toast" style="
  position:fixed; bottom:110px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,0.75); color:#fff; padding:8px 20px;
  border-radius:20px; font-size:13px; z-index:300;
  opacity:0; transition:opacity 0.2s; pointer-events:none; white-space:nowrap;
"></div>

<script>
  const video = document.getElementById('mainVideo');
  const progressFill = document.getElementById('progressFill');
  const playIndicator = document.getElementById('playIndicator');
  const swipeHint = document.getElementById('swipeHint');
  let liked = false;
  let collected = false;
  let likeNum = 24000;
  let collectNum = 11000;

  // 自动播放
  video.addEventListener('canplay', () => {
    video.play().catch(() => {});
  });

  // 进度条
  video.addEventListener('timeupdate', () => {
    if (video.duration) {
      progressFill.style.width = (video.currentTime / video.duration * 100) + '%';
    }
  });

  // 点击暂停/播放
  document.getElementById('feed').addEventListener('click', () => {
    if (video.paused) {
      video.play();
      showPlayPause(false);
    } else {
      video.pause();
      showPlayPause(true);
    }
  });

  function showPlayPause(isPause) {
    playIndicator.querySelector('path').setAttribute('d',
      isPause ? 'M8 5v14l11-7z' : 'M10 9v6m4-6v6'
    );
    playIndicator.classList.remove('show');
    void playIndicator.offsetWidth;
    playIndicator.classList.add('show');
  }

  // 点赞
  function toggleLike() {
    liked = !liked;
    const btn = document.getElementById('likeBtn');
    const svg = document.getElementById('heartSvg');
    if (liked) {
      likeNum++;
      svg.setAttribute('fill', '#fe2c55');
      btn.classList.add('liked');
      spawnHeart();
    } else {
      likeNum--;
      svg.setAttribute('fill', 'rgba(255,255,255,0.9)');
      btn.classList.remove('liked');
    }
    document.getElementById('likeCount').textContent = formatNum(likeNum);
    setTimeout(() => btn.classList.remove('liked'), 400);
  }

  // 收藏
  function toggleCollect() {
    collected = !collected;
    const svg = document.getElementById('starSvg');
    if (collected) {
      collectNum++;
      svg.setAttribute('fill', '#ffd700');
    } else {
      collectNum--;
      svg.setAttribute('fill', 'rgba(255,255,255,0.9)');
    }
    document.getElementById('collectCount').textContent = formatNum(collectNum);
  }

  function formatNum(n) {
    if (n >= 10000) return (n / 10000).toFixed(1) + '万';
    return n.toString();
  }

  // 飘心
  function spawnHeart() {
    const heart = document.createElement('div');
    heart.className = 'float-heart';
    heart.textContent = '❤️';
    heart.style.bottom = (90 + Math.random() * 40) + 'px';
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 1000);
  }

  // Toast
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.opacity = '1';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.style.opacity = '0', 2000);
  }

  // 滑动手势（模拟"还有更多"效果）
  let startY = 0;
  let isDragging = false;
  const feed = document.getElementById('feed');
  const videoItem = document.getElementById('videoItem');

  feed.addEventListener('touchstart', e => {
    startY = e.touches[0].clientY;
    isDragging = true;
    // 隐藏滑动提示
    swipeHint.style.display = 'none';
  }, { passive: true });

  feed.addEventListener('touchmove', e => {
    if (!isDragging) return;
    const dy = e.touches[0].clientY - startY;
    // 只允许向上拉（dy < 0）有弹性效果
    if (dy < 0) {
      videoItem.style.transition = 'none';
      videoItem.style.transform = `translateY(${dy * 0.2}px)`;
    }
  }, { passive: true });

  feed.addEventListener('touchend', e => {
    isDragging = false;
    videoItem.style.transition = 'transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
    videoItem.style.transform = 'translateY(0)';
    const dy = e.changedTouches[0].clientY - startY;
    if (dy < -60) {
      showToast('已经是最新视频啦，快去上传更多吧 🎬');
    }
  }, { passive: true });
</script>
