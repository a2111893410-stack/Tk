<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>抖音</title>
<style>
  :root {
    --red: #fe2c55;
    --cyan: #25f4ee;
  }

- { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
background: #000;
font-family: -apple-system, “PingFang SC”, “Helvetica Neue”, sans-serif;
overflow: hidden;
height: 100vh; width: 100vw;
color: #fff;
user-select: none;
}

/* ── 视频全屏 ── */
#videoLayer {
position: fixed;
inset: 0;
z-index: 1;
}

#mainVideo {
width: 100%; height: 100%;
object-fit: cover;
display: block;
}

/* ── 渐变遮罩 ── */
.mask-top {
position: fixed; top: 0; left: 0; right: 0;
height: 180px;
background: linear-gradient(to bottom, rgba(0,0,0,0.38) 0%, transparent 100%);
z-index: 2; pointer-events: none;
}
.mask-bottom {
position: fixed; bottom: 0; left: 0; right: 0;
height: 280px;
background: linear-gradient(to top, rgba(0,0,0,0.52) 0%, transparent 100%);
z-index: 2; pointer-events: none;
}

/* ══════════════════════════════
顶部导航  —— 精确对照截图
══════════════════════════════ */
.top-nav {
position: fixed;
top: env(safe-area-inset-top, 44px);
left: 0; right: 0;
z-index: 10;
display: flex;
align-items: center;
padding: 0 12px;
height: 44px;
}

/* 左侧汉堡 */
.nav-menu {
width: 36px;
display: flex; flex-direction: column; gap: 5px;
flex-shrink: 0;
cursor: pointer;
}
.nav-menu span {
display: block; height: 1.5px; background: #fff;
border-radius: 1px;
}
.nav-menu span:nth-child(2) { width: 80%; }

/* 中间标签滚动区 */
.nav-tabs {
flex: 1;
display: flex;
align-items: center;
gap: 0;
overflow-x: auto;
scrollbar-width: none;
padding: 0 4px;
}
.nav-tabs::-webkit-scrollbar { display: none; }

.nav-tab {
flex-shrink: 0;
font-size: 15px;
color: rgba(255,255,255,0.65);
font-weight: 500;
padding: 0 10px;
cursor: pointer;
white-space: nowrap;
position: relative;
line-height: 44px;
letter-spacing: 0.2px;
}

.nav-tab.active {
color: #fff;
font-size: 17px;
font-weight: 700;
}

.nav-tab.active::after {
content: ‘’;
position: absolute;
bottom: 3px;
left: 50%;
transform: translateX(-50%);
width: 16px; height: 2.5px;
background: #fff;
border-radius: 2px;
}

/* 右侧搜索 */
.nav-search {
width: 36px;
display: flex; align-items: center; justify-content: flex-end;
flex-shrink: 0;
cursor: pointer;
}

/* ══════════════════════════════
右侧操作栏  —— 真实抖音白色图标风格
══════════════════════════════ */
.side-bar {
position: fixed;
right: 8px;
bottom: calc(env(safe-area-inset-bottom, 0px) + 72px);
z-index: 10;
display: flex;
flex-direction: column;
align-items: center;
gap: 0;
}

/* 头像 */
.avatar-wrap {
width: 52px; height: 52px;
position: relative;
margin-bottom: 28px;
}

.avatar-img {
width: 52px; height: 52px;
border-radius: 50%;
border: 1.5px solid #fff;
object-fit: cover;
background: #333;
display: flex; align-items: center; justify-content: center;
overflow: hidden;
}

.avatar-img svg { width: 100%; height: 100%; }

.avatar-plus {
position: absolute;
bottom: -9px; left: 50%;
transform: translateX(-50%);
width: 22px; height: 22px;
background: var(–red);
border-radius: 50%;
display: flex; align-items: center; justify-content: center;
font-size: 16px; font-weight: 400; color: #fff;
line-height: 1;
box-shadow: 0 1px 4px rgba(0,0,0,0.3);
}

/* 各操作按钮 ── 白色图标直接悬浮，无背景圆 */
.side-btn {
display: flex;
flex-direction: column;
align-items: center;
gap: 5px;
margin-bottom: 22px;
cursor: pointer;
-webkit-tap-highlight-color: transparent;
}

.side-btn .icon-wrap {
width: 50px; height: 50px;
display: flex; align-items: center; justify-content: center;
}

/* 白色图标 + 柔和阴影（真实抖音效果） */
.side-btn .icon-wrap svg {
filter: drop-shadow(0 2px 6px rgba(0,0,0,0.35));
}

.side-btn .label {
font-size: 13px;
color: #fff;
font-weight: 600;
text-shadow: 0 1px 4px rgba(0,0,0,0.55);
letter-spacing: 0.5px;
text-align: center;
}

/* 点赞心形过渡 */
#heartIcon { transition: fill 0.15s; }

/* 底部旋转唱片 */
.disc-wrap {
width: 50px; height: 50px;
margin-top: 4px;
}

.disc {
width: 50px; height: 50px;
border-radius: 50%;
background: radial-gradient(circle at 50% 50%, #666 0%, #2a2a2a 50%, #111 100%);
border: 7px solid #2e2e2e;
animation: discSpin 5s linear infinite;
position: relative;
box-shadow: 0 2px 8px rgba(0,0,0,0.5);
}

.disc::after {
content: ‘’;
position: absolute;
top: 50%; left: 50%;
transform: translate(-50%, -50%);
width: 11px; height: 11px;
border-radius: 50%;
background: #1a1a1a;
border: 2px solid #555;
}

@keyframes discSpin {
from { transform: rotate(0deg); }
to   { transform: rotate(360deg); }
}

/* ══════════════════════════════
底部视频信息  —— 左下角
══════════════════════════════ */
.video-info {
position: fixed;
left: 14px;
bottom: calc(env(safe-area-inset-bottom, 0px) + 72px);
right: 76px;
z-index: 10;
}

.vi-username {
font-size: 17px;
font-weight: 700;
color: #fff;
margin-bottom: 6px;
text-shadow: 0 1px 4px rgba(0,0,0,0.3);
}

.vi-desc {
font-size: 14px;
color: rgba(255,255,255,0.92);
line-height: 1.45;
margin-bottom: 10px;
text-shadow: 0 1px 3px rgba(0,0,0,0.3);
display: flex;
align-items: center;
gap: 4px;
flex-wrap: wrap;
}

.vi-desc .expand {
color: rgba(255,255,255,0.6);
font-size: 13px;
}

.vi-music {
display: flex;
align-items: center;
gap: 6px;
overflow: hidden;
}

.vi-music-text {
font-size: 13px;
color: rgba(255,255,255,0.88);
white-space: nowrap;
overflow: hidden;
animation: musicScroll 10s linear infinite;
display: inline-block;
}

@keyframes musicScroll {
0%   { transform: translateX(0); }
40%  { transform: translateX(-45%); }
50%  { transform: translateX(-45%); }
90%  { transform: translateX(0); }
100% { transform: translateX(0); }
}

/* ══════════════════════════════
底部导航栏  —— 精确对照截图
══════════════════════════════ */
.tab-bar {
position: fixed;
bottom: 0; left: 0; right: 0;
height: calc(55px + env(safe-area-inset-bottom, 0px));
padding-bottom: env(safe-area-inset-bottom, 0px);
background: rgba(0,0,0,0.92);
border-top: 0.5px solid rgba(255,255,255,0.1);
z-index: 20;
display: flex;
align-items: center;
}

.tab-item {
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 3px;
cursor: pointer;
height: 55px;
}

.tab-item .tab-label {
font-size: 10px;
color: rgba(255,255,255,0.45);
font-weight: 600;
letter-spacing: 0.3px;
}

.tab-item.active .tab-label {
color: #fff;
font-size: 11px;
}

/* 发布按钮 —— 双色描边白色圆角矩形 */
.tab-publish {
flex: 1;
display: flex; align-items: center; justify-content: center;
height: 55px; cursor: pointer;
}

.pub-btn {
width: 46px; height: 30px;
position: relative;
display: flex; align-items: center; justify-content: center;
}

.pub-btn::before {
content: ‘’;
position: absolute;
left: -4px; top: 0;
width: 46px; height: 30px;
background: var(–cyan);
border-radius: 8px;
z-index: 0;
}

.pub-btn::after {
content: ‘’;
position: absolute;
right: -4px; top: 0;
width: 46px; height: 30px;
background: var(–red);
border-radius: 8px;
z-index: 0;
}

.pub-inner {
width: 42px; height: 30px;
background: #fff;
border-radius: 7px;
display: flex; align-items: center; justify-content: center;
position: relative; z-index: 1;
color: #000;
font-size: 22px;
font-weight: 300;
line-height: 1;
}

/* ══════════════════════════════
双击飘心
══════════════════════════════ */
.tap-heart {
position: fixed;
width: 90px; height: 90px;
pointer-events: none;
z-index: 999;
transform: translate(-50%, -50%) scale(0);
animation: heartFloat 0.85s ease-out forwards;
}

@keyframes heartFloat {
0%   { transform: translate(-50%, -50%) scale(0.4); opacity: 0; }
20%  { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
60%  { transform: translate(-50%, -100%) scale(1.1); opacity: 0.8; }
100% { transform: translate(-50%, -180%) scale(0.8); opacity: 0; }
}

/* ══════════════════════════════
点赞数字跳动
══════════════════════════════ */
.count-bump {
animation: countBump 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes countBump {
0%   { transform: scale(1); }
50%  { transform: scale(1.4); }
100% { transform: scale(1); }
}

/* Toast */
#toast {
position: fixed;
bottom: 120px; left: 50%;
transform: translateX(-50%);
background: rgba(0,0,0,0.72);
color: #fff; padding: 9px 22px;
border-radius: 22px; font-size: 13px;
z-index: 999; opacity: 0;
transition: opacity 0.25s;
pointer-events: none;
white-space: nowrap;
}
</style>

</head>
<body>

<!-- 视频 -->

<div id="videoLayer">
  <video id="mainVideo"
    src="https://turquoise-absolute-cheetah-543.mypinata.cloud/ipfs/bafybeie53svjmqhznjlosvlkvtu7cckzrgwexo3h2ljvartpuhzsr3kdki"
    loop playsinline webkit-playsinline preload="auto">
  </video>
</div>

<!-- 遮罩 -->

<div class="mask-top"></div>
<div class="mask-bottom"></div>

<!-- 顶部导航 -->

<nav class="top-nav">
  <div class="nav-menu">
    <span></span><span></span><span></span>
  </div>
  <div class="nav-tabs" id="navTabs">
    <div class="nav-tab" onclick="switchTab(this)">成都</div>
    <div class="nav-tab" onclick="switchTab(this)">精选</div>
    <div class="nav-tab" onclick="switchTab(this)">团购</div>
    <div class="nav-tab" onclick="switchTab(this)">直播</div>
    <div class="nav-tab" onclick="switchTab(this)">关注</div>
    <div class="nav-tab" onclick="switchTab(this)">朋友</div>
    <div class="nav-tab active" onclick="switchTab(this)">推荐</div>
  </div>
  <div class="nav-search">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round">
      <circle cx="11" cy="11" r="7.5"/>
      <line x1="20" y1="20" x2="16.2" y2="16.2"/>
    </svg>
  </div>
</nav>

<!-- 右侧操作栏 -->

<div class="side-bar">

  <!-- 头像 -->

  <div class="avatar-wrap">
    <div class="avatar-img">
      <!-- 动漫风头像 SVG（对照截图黑发女生样式） -->
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <rect width="100" height="100" fill="#1a1a2e"/>
        <ellipse cx="50" cy="62" rx="28" ry="22" fill="#f5c5a3"/>
        <ellipse cx="50" cy="48" rx="22" ry="24" fill="#f5c5a3"/>
        <!-- 黑发 -->
        <ellipse cx="50" cy="36" rx="24" ry="20" fill="#1a1a1a"/>
        <rect x="26" y="30" width="10" height="36" rx="4" fill="#1a1a1a"/>
        <rect x="64" y="30" width="10" height="36" rx="4" fill="#1a1a1a"/>
        <ellipse cx="50" cy="26" rx="22" ry="14" fill="#1a1a1a"/>
        <!-- 眼睛 -->
        <ellipse cx="40" cy="50" rx="5" ry="6" fill="#1a1a1a"/>
        <ellipse cx="60" cy="50" rx="5" ry="6" fill="#1a1a1a"/>
        <circle cx="41.5" cy="48.5" r="1.5" fill="#fff"/>
        <circle cx="61.5" cy="48.5" r="1.5" fill="#fff"/>
        <!-- 嘴 -->
        <path d="M44 60 Q50 65 56 60" stroke="#d4896a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <!-- 衣领 -->
        <rect x="30" y="82" width="40" height="20" rx="4" fill="#e8e8f0"/>
      </svg>
    </div>
    <div class="avatar-plus">+</div>
  </div>

  <!-- 点赞：饱满心形，截图是纯白填充 -->

  <div class="side-btn" id="likeBtn" onclick="toggleLike()">
    <div class="icon-wrap">
      <svg id="heartIcon" width="46" height="46" viewBox="0 0 100 100" fill="white">
        <path d="M50 85 C50 85 10 58 10 32 C10 18 20 10 32 10 C40 10 47 15 50 21 C53 15 60 10 68 10 C80 10 90 18 90 32 C90 58 50 85 50 85 Z"/>
      </svg>
    </div>
    <span class="label" id="likeLabel">3888</span>
  </div>

  <!-- 评论：圆润气泡+三个圆点，截图样式 -->

  <div class="side-btn" onclick="showToast('评论功能开发中~')">
    <div class="icon-wrap">
      <svg width="46" height="46" viewBox="0 0 100 100">
        <!-- 气泡主体 -->
        <path d="M50 12 C28 12 12 26 12 44 C12 56 19 66 31 72 L26 88 L44 78 C46 78.5 48 79 50 79 C72 79 88 65 88 47 C88 29 72 12 50 12 Z" fill="white"/>
        <!-- 三个点 -->
        <circle cx="34" cy="46" r="5.5" fill="#c0c0c0"/>
        <circle cx="50" cy="46" r="5.5" fill="#c0c0c0"/>
        <circle cx="66" cy="46" r="5.5" fill="#c0c0c0"/>
      </svg>
    </div>
    <span class="label">199</span>
  </div>

  <!-- 收藏：5角星，截图是实心白色偏暖 -->

  <div class="side-btn" id="starBtn" onclick="toggleStar()">
    <div class="icon-wrap">
      <svg id="starIcon" width="46" height="46" viewBox="0 0 100 100" fill="white">
        <polygon points="50,8 63,36 94,39 72,60 78,91 50,76 22,91 28,60 6,39 37,36"/>
      </svg>
    </div>
    <span class="label" id="starLabel">534</span>
  </div>

  <!-- 分享：弯曲箭头，截图右弯样式 -->

  <div class="side-btn" onclick="showToast('分享功能开发中~')">
    <div class="icon-wrap">
      <svg width="46" height="46" viewBox="0 0 100 100" fill="white">
        <!-- 弧形箭头主体 -->
        <path d="M20 75 C20 45 45 30 72 32 L62 18 L90 38 L62 55 L72 42 C50 40 32 52 32 75 Z"/>
      </svg>
    </div>
    <span class="label">84</span>
  </div>

  <!-- 旋转唱片 -->

  <div class="disc-wrap">
    <div class="disc"></div>
  </div>

</div>

<!-- 底部视频信息 -->

<div class="video-info">
  <div class="vi-username">@我的Pinata视频</div>
  <div class="vi-desc">
    这是存在IPFS上的视频 🎉 #去中心化存储 #Web3
    <span class="expand">不收徒#魔术 ∨</span>
  </div>
  <div class="vi-music">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="rgba(255,255,255,0.85)">
      <path d="M9 18V5l12-2v13M9 18a3 3 0 1 1-6 0 3 3 0 0 1 6 0zm12-2a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/>
    </svg>
    <span class="vi-music-text">原声 - IPFS去中心化存储演示 · 原声 - IPFS去中心化存储演示</span>
  </div>
</div>

<!-- 底部导航 -->

<div class="tab-bar">
  <div class="tab-item active">
    <span class="tab-label">首页</span>
  </div>
  <div class="tab-item" onclick="showToast('敬请期待~')">
    <span class="tab-label">商城</span>
  </div>
  <div class="tab-publish">
    <div class="pub-btn" onclick="showToast('发布功能开发中~')">
      <div class="pub-inner">+</div>
    </div>
  </div>
  <div class="tab-item" onclick="showToast('敬请期待~')">
    <span class="tab-label">消息</span>
  </div>
  <div class="tab-item" onclick="showToast('敬请期待~')">
    <span class="tab-label">我</span>
  </div>
</div>

<!-- Toast -->

<div id="toast"></div>

<script>
  const video = document.getElementById('mainVideo');

  // 自动播放
  const tryPlay = () => video.play().catch(() => {});
  video.addEventListener('canplay', tryPlay);
  document.addEventListener('touchstart', tryPlay, { once: true });
  document.addEventListener('click', tryPlay, { once: true });

  // 单击 暂停/播放
  document.getElementById('videoLayer').addEventListener('click', function(e) {
    // 防止操作按钮触发
    if (e.target.closest('.side-bar') || e.target.closest('.top-nav') || e.target.closest('.tab-bar') || e.target.closest('.video-info')) return;
    video.paused ? video.play() : video.pause();
  });

  // 双击点赞
  let lastTap = 0;
  document.getElementById('videoLayer').addEventListener('touchend', function(e) {
    const now = Date.now();
    if (now - lastTap < 280) {
      spawnHeart(e.changedTouches[0].pageX, e.changedTouches[0].pageY);
      if (!liked) toggleLike();
    }
    lastTap = now;
  });

  // 点赞
  let liked = false;
  let likeNum = 3888;

  function toggleLike() {
    liked = !liked;
    const icon = document.getElementById('heartIcon');
    const label = document.getElementById('likeLabel');
    if (liked) {
      likeNum++;
      icon.setAttribute('fill', '#fe2c55');
      icon.style.animation = 'none';
      requestAnimationFrame(() => {
        icon.style.animation = '';
        icon.style.transform = 'scale(1.35)';
        setTimeout(() => icon.style.transform = '', 200);
      });
    } else {
      likeNum--;
      icon.setAttribute('fill', 'rgba(255,255,255,0.95)');
    }
    label.textContent = fmtNum(likeNum);
    label.classList.remove('count-bump');
    void label.offsetWidth;
    label.classList.add('count-bump');
  }

  // 收藏
  let starred = false;
  let starNum = 17000;

  function toggleStar() {
    starred = !starred;
    const icon = document.getElementById('starIcon');
    const label = document.getElementById('starLabel');
    if (starred) {
      starNum++;
      icon.setAttribute('fill', '#ffd700');
    } else {
      starNum--;
      icon.setAttribute('fill', 'rgba(255,255,255,0.95)');
    }
    label.textContent = fmtNum(starNum);
  }

  function fmtNum(n) {
    if (n >= 10000) return (n / 10000).toFixed(1) + '万';
    return n.toLocaleString();
  }

  // 飘心
  function spawnHeart(x, y) {
    const el = document.createElement('div');
    el.className = 'tap-heart';
    el.style.cssText = `left:${x}px;top:${y}px`;
    el.innerHTML = `<svg viewBox="0 0 24 24" fill="#fe2c55" xmlns="http://www.w3.org/2000/svg">
      <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
    </svg>`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 860);
  }

  // 导航切换
  function switchTab(el) {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }

  // Toast
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.opacity = '1';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.style.opacity = '0', 2000);
  }
</script>

</body>
</html>
