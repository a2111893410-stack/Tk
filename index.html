<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>抖音 - 细节还原版</title>
<style>
  :root {
    --red: #fe2c55;
    --cyan: #25f4ee;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: #000;
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
    overflow: hidden;
    height: 100vh; width: 100vw;
    color: #fff;
    user-select: none;
  }

  /* ── 视频层 ── */
  #videoLayer { position: fixed; inset: 0; z-index: 1; }
  #mainVideo { width: 100%; height: 100%; object-fit: cover; display: block; }

  /* ── 渐变遮罩 ── */
  .mask-top {
    position: fixed; top: 0; left: 0; right: 0; height: 160px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 100%);
    z-index: 2; pointer-events: none;
  }
  .mask-bottom {
    position: fixed; bottom: 0; left: 0; right: 0; height: 260px;
    background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 100%);
    z-index: 2; pointer-events: none;
  }

  /* ══════════════════════════════
     顶部导航 - 文字居中
  ══════════════════════════════ */
  .top-nav {
    position: fixed;
    top: env(safe-area-inset-top, 44px);
    left: 0; right: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    padding: 0 12px;
    height: 44px;
  }

  .nav-menu {
    width: 36px; /* 保持与搜索同宽，助力居中 */
    display: flex; flex-direction: column; gap: 4px;
    flex-shrink: 0; cursor: pointer;
  }
  .nav-menu span {
    display: block; height: 2px; background: #fff;
    border-radius: 1px; width: 22px;
  }
  .nav-menu span:nth-child(2) { width: 16px; }

  .nav-tabs {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center; /* 核心：文字居中 */
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .nav-tabs::-webkit-scrollbar { display: none; }

  .nav-tab {
    flex-shrink: 0;
    font-size: 16px;
    color: rgba(255,255,255,0.65);
    font-weight: 500;
    padding: 0 10px;
    cursor: pointer;
    white-space: nowrap;
    position: relative;
    line-height: 44px;
  }

  .nav-tab.active {
    color: #fff;
    font-size: 17px;
    font-weight: 700;
  }

  .nav-tab.active::after {
    content: '';
    position: absolute;
    bottom: 4px;
    left: 50%;
    transform: translateX(-50%);
    width: 16px; height: 2.5px;
    background: #fff;
    border-radius: 2px;
  }

  .nav-search {
    width: 36px;
    display: flex; align-items: center; justify-content: flex-end;
    flex-shrink: 0;
  }

  /* ══════════════════════════════
     右侧操作栏 - 优化箭头 & 移除唱片
  ══════════════════════════════ */
  .side-bar {
    position: fixed;
    right: 10px;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 90px);
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .avatar-wrap {
    width: 52px; height: 52px;
    position: relative;
    margin-bottom: 22px;
  }

  .avatar-img {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 1.5px solid #fff;
    background: #333;
    overflow: hidden;
  }

  .avatar-plus {
    position: absolute;
    bottom: -8px; left: 50%;
    transform: translateX(-50%);
    width: 20px; height: 20px;
    background: var(--red);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: bold; color: #fff;
    border: 1.5px solid #fff;
  }

  .side-btn {
    display: flex; flex-direction: column; align-items: center;
    margin-bottom: 18px; cursor: pointer;
  }

  .side-btn .icon-wrap { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; }

  .side-btn .label {
    font-size: 12px; color: #fff; font-weight: 500;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  }

  /* ══════════════════════════════
     底部导航栏 - 还原发布按钮
  ══════════════════════════════ */
  .tab-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: calc(55px + env(safe-area-inset-bottom, 0px));
    padding-bottom: env(safe-area-inset-bottom, 0px);
    background: #000;
    border-top: 0.5px solid rgba(255,255,255,0.1);
    z-index: 20;
    display: flex;
    align-items: center;
  }

  .tab-item {
    flex: 1; display: flex; align-items: center; justify-content: center;
    height: 100%;
  }

  .tab-item .tab-label {
    font-size: 17px; /* 与顶部字号一致 */
    color: rgba(255,255,255,0.45);
    font-weight: 600;
  }

  .tab-item.active .tab-label {
    color: #fff;
  }

  /* 还原原版发布按钮逻辑 */
  .tab-publish { flex: 1; display: flex; align-items: center; justify-content: center; height: 55px; }

  .pub-btn {
    width: 46px; height: 30px;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }

  .pub-btn::before {
    content: ''; position: absolute; left: -4px; top: 0;
    width: 46px; height: 30px; background: var(--cyan); border-radius: 8px; z-index: 0;
  }

  .pub-btn::after {
    content: ''; position: absolute; right: -4px; top: 0;
    width: 46px; height: 30px; background: var(--red); border-radius: 8px; z-index: 0;
  }

  .pub-inner {
    width: 42px; height: 30px;
    background: #fff;
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    position: relative; z-index: 1;
    color: #000; font-size: 22px; font-weight: 300; line-height: 1;
  }

  /* ══════════════════════════════
     视频信息
  ══════════════════════════════ */
  .video-info {
    position: fixed; left: 14px;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 80px);
    right: 80px; z-index: 10;
  }
  .vi-username { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
  .vi-desc { font-size: 14px; color: rgba(255,255,255,0.92); line-height: 1.4; }

</style>
</head>
<body>

<div id="videoLayer">
  <video id="mainVideo" src="https://turquoise-absolute-cheetah-543.mypinata.cloud/ipfs/bafybeie53svjmqhznjlosvlkvtu7cckzrgwexo3h2ljvartpuhzsr3kdki" loop playsinline></video>
</div>

<div class="mask-top"></div>
<div class="mask-bottom"></div>

<nav class="top-nav">
  <div class="nav-menu">
    <span></span><span></span><span></span>
  </div>
  <div class="nav-tabs" id="navTabs">
    <div class="nav-tab" onclick="switchTab(this)">精选</div>
    <div class="nav-tab" onclick="switchTab(this)">热点</div>
    <div class="nav-tab" onclick="switchTab(this)">直播</div>
    <div class="nav-tab active" onclick="switchTab(this)">推荐</div>
  </div>
  <div class="nav-search">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  </div>
</nav>

<div class="side-bar">
  <div class="avatar-wrap">
    <div class="avatar-img">
      <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="50" fill="#222"/><text x="50%" y="55%" text-anchor="middle" fill="#888" font-size="16">Avatar</text></svg>
    </div>
    <div class="avatar-plus">+</div>
  </div>

  <div class="side-btn" onclick="toggleLike()">
    <div class="icon-wrap">
      <svg id="heartIcon" width="38" height="38" viewBox="0 0 24 24" fill="#fff"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    </div>
    <span class="label">37.1万</span>
  </div>

  <div class="side-btn">
    <div class="icon-wrap">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="#fff"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </div>
    <span class="label">4982</span>
  </div>

  <div class="side-btn">
    <div class="icon-wrap">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="#fff"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
    </div>
    <span class="label">1.7万</span>
  </div>

  <div class="side-btn">
    <div class="icon-wrap">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="#fff">
        <path d="M14 4.5V1l7 7-7 7v-4.1c-5 0-8.5 1.6-11 5.1 1-5 4-10 11-11z"/>
      </svg>
    </div>
    <span class="label">3.2万</span>
  </div>
</div>

<div class="video-info">
  <div class="vi-username">@我的Pinata视频</div>
  <div class="vi-desc">UI界面已根据你的要求精准校准！✨</div>
</div>

<div class="tab-bar">
  <div class="tab-item active"><span class="tab-label">首页</span></div>
  <div class="tab-item"><span class="tab-label">商城</span></div>
  <div class="tab-publish">
    <div class="pub-btn">
      <div class="pub-inner">+</div>
    </div>
  </div>
  <div class="tab-item"><span class="tab-label">消息</span></div>
  <div class="tab-item"><span class="tab-label">我</span></div>
</div>

<script>
  const video = document.getElementById('mainVideo');
  document.addEventListener('click', () => video.play().catch(()=>{}), { once: true });

  function switchTab(el) {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  }

  let liked = false;
  function toggleLike() {
    liked = !liked;
    document.getElementById('heartIcon').setAttribute('fill', liked ? '#fe2c55' : '#fff');
  }
</script>

</body>
</html>
