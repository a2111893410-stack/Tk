<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>全屏沉浸播放</title>
    <style>
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100%;
            height: 100dvh;
            background-color: #000;
            overflow: hidden;
            position: fixed;
        }

        .scroll-container {
            width: 100vw;
            height: 100dvh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .scroll-container::-webkit-scrollbar { display: none; }

        .video-section {
            width: 100vw;
            height: 100dvh;
            scroll-snap-align: start;
            position: relative;
            background: #000;
        }

        .main-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 关键修改：改回 cover。虽然会裁剪边缘，但这是保证没有任何黑边的唯一办法 */
            object-fit: cover; 
            display: block;
        }
    </style>
</head>
<body>

<div class="scroll-container">
    <div class="video-section"><video class="main-video" loop playsinline muted preload="auto" src="https://turquoise-absolute-cheetah-543.mypinata.cloud/ipfs/bafybeied7iqyfz7fo5tg6jumdcp53cezwlmvouazyt5sqj5nwlzohn7vxm"></video></div>
    <div class="video-section"><video class="main-video" loop playsinline muted preload="auto" src="https://turquoise-absolute-cheetah-543.mypinata.cloud/ipfs/bafybeihokl2aj6p2ftxwivc6ty6xg3zx3lu3bw2norvlyhdjmrkb4shaiq"></video></div>
    <div class="video-section"><video class="main-video" loop playsinline muted preload="auto" src="https://turquoise-absolute-cheetah-543.mypinata.cloud/ipfs/bafybeifkqtkjlgcfs6ikmkc5cc6psr23hhuz2kgy62teikohlas63prqou"></video></div>
    <div class="video-section"><video class="main-video" loop playsinline muted preload="auto" src="https://turquoise-absolute-cheetah-543.mypinata.cloud/ipfs/bafybeidsgny5mif27lqu7bt5z7g4a63raoxwjhslhmmegzwhljgjd3iggq"></video></div>
    <div class="video-section"><video class="main-video" loop playsinline muted preload="auto" src="https://turquoise-absolute-cheetah-543.mypinata.cloud/ipfs/bafybeiexn5pzogmujgmvwnmzdqw2axyh3s3ixumjlabcei4vbw35abyvhe"></video></div>
    <div class="video-section"><video class="main-video" loop playsinline muted preload="auto" src="https://turquoise-absolute-cheetah-543.mypinata.cloud/ipfs/bafybeidifsdf3xpabcrkypgu4c77i7pmgdru4iea2zus6rlbw6vfjfzvvy"></video></div>
    <div class="video-section"><video class="main-video" loop playsinline muted preload="auto" src="https://turquoise-absolute-cheetah-543.mypinata.cloud/ipfs/bafybeibafjebhoq6xh3esnbs6w2mao4cun4qfslruyaozgx54wgbjfbxoe"></video></div>
    <div class="video-section"><video class="main-video" loop playsinline muted preload="auto" src="https://turquoise-absolute-cheetah-543.mypinata.cloud/ipfs/bafybeidbpdoz4mtbk45wisqvcwgdewao4obuvwo2s5narprsr7rypsd76u"></video></div>
    <div class="video-section"><video class="main-video" loop playsinline muted preload="auto" src="https://turquoise-absolute-cheetah-543.mypinata.cloud/ipfs/bafybeifskd2zsnlquiyp4bdv2q2b2rzukscpr6lurer75buhy6qgb545ea"></video></div>
</div>

<script>
    // 自动播放监听
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.play().catch(() => {});
            } else {
                entry.target.pause();
                entry.target.currentTime = 0;
            }
        });
    }, { threshold: 0.5 });

    document.querySelectorAll('.main-video').forEach(vid => observer.observe(vid));

    // 用户交互后隐藏地址栏尝试
    document.addEventListener('touchstart', () => {
        window.scrollTo(0, 1); // 移动端向上滑动 1 像素通常可以触发地址栏收起
        document.querySelectorAll('.main-video').forEach(v => {
            v.muted = false;
            const rect = v.getBoundingClientRect();
            if (rect.top >= 0 && rect.top < window.innerHeight) { v.play().catch(()=>{}); }
        });
    }, { once: true });
</script>
</body>
</html>
