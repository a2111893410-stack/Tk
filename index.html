<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>抖音还原版 - 10视频同步布局</title>
<style>
  :root { --red: #fe2c55; --cyan: #25f4ee; }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: #000;
    font-family: -apple-system, "PingFang SC", sans-serif;
    overflow: hidden;
    height: 100dvh; width: 100vw;
    color: #fff;
    user-select: none;
  }

  /* ── 滑动容器 ── */
  .scroll-container {
    height: 100dvh;
    width: 100vw;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    scrollbar-width: none;
  }
  .scroll-container::-webkit-scrollbar { display: none; }

  /* ── 每一个视频全屏槽位 ── */
  .video-section {
    width: 100vw;
    height: 100dvh;
    scroll-snap-align: start;
    position: relative;
    overflow: hidden;
  }

  .main-video {
    width: 100%;
    height: 100%;
    object-fit: cover; /* 撑满全屏 */
    background: #000;
  }

  /* ── 遮罩（固定层） ── */
  .mask-top {
    position: fixed; top: 0; left: 0; right: 0; height: 160px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 100%);
    z-index: 2; pointer-events: none;
  }
  .mask-bottom {
    position: fixed; bottom: 0; left: 0; right: 0; height: 260px;
    background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 100%);
    z-index: 2; pointer-events: none;
  }

  /* ── 顶部导航（固定层） ── */
  .top-nav {
    position: fixed; top: env(safe-area-inset-top, 44px); left: 0; right: 0;
    z-index: 10; display: flex; align-items: center; padding: 0 12px; height: 44px;
  }
  .nav-menu { width: 36px; display: flex; flex-direction: column; gap: 4px; }
  .nav-menu span { display: block; height: 2px; background: #fff; border-radius: 1px; width: 22px; }
  .nav-menu span:nth-child(2) { width: 16px; }
  .nav-tabs { flex: 1; display: flex; justify-content: center; }
  .nav-tab { font-size: 16px; color: rgba(255,255,255,0.65); padding: 0 10px; line-height: 44px; position: relative; }
  .nav-tab.active { color: #fff; font-size: 17px; font-weight: 700; }
  .nav-tab.active::after { content: ''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); width: 16px; height: 2.5px; background: #fff; }

  /* ── 侧边栏（随视频滚动） ── */
  .side-bar {
    position: absolute; right: 5px; bottom: 100px;
    z-index: 5; display: flex; flex-direction: column; align-items: center;
  }
  .avatar-wrap { width: 52px; height: 52px; position: relative; margin-bottom: 22px; }
  .avatar-img { width: 52px; height: 52px; border-radius: 50%; border: 1.5px solid #fff; background: #333; overflow: hidden; }
  .avatar-plus { position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 23px; height: 23px; background: var(--red); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1.5px solid #fff; font-size: 16px; }

  .side-btn { display: flex; flex-direction: column; align-items: center; margin-bottom: 8px; }
  .icon-wrap { width: 45px; height: 50px; display: flex; align-items: center; justify-content: center; }
  .label { font-size: 12px; margin-top: -8px; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }

  /* ── 视频信息（随视频滚动） ── */
  .video-info { position: absolute; left: 14px; bottom: 20px; right: 80px; z-index: 5; }
  .vi-username { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
  .vi-desc { font-size: 14px; color: rgba(255,255,255,0.92); line-height: 1.4; }

  /* ── 底部栏（固定层） ── */
  .tab-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: calc(55px + env(safe-area-inset-bottom, 0px));
    background: #000; border-top: 0.5px solid rgba(255,255,255,0.1);
    z-index: 20; display: flex; align-items: center;
  }
  .tab-item { flex: 1; display: flex; justify-content: center; color: rgba(255,255,255,0.45); font-weight: 600; font-size: 17px; }
  .tab-item.active { color: #fff; }
  .pub-btn { width: 46px; height: 30px; position: relative; display: flex; align-items: center; justify-content: center; }
  .pub-btn::before { content: ''; position: absolute; left: -2px; width: 46px; height: 30px; background: var(--cyan); border-radius: 8px; }
  .pub-btn::after { content: ''; position: absolute; right: -2px; width: 46px; height: 30px; background: var(--red); border-radius: 8px; }
  .pub-inner { width: 42px; height: 30px; background: #fff; border-radius: 7px; position: relative; z-index: 1; color: #000; font-size: 22px; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>

<div class="mask-top"></div>
<div class="mask-bottom"></div>
<nav class="top-nav">
  <div class="nav-menu"><span></span><span></span><span></span></div>
  <div class="nav-tabs">
    <div class="nav-tab">精选</div><div class="nav-tab">热点</div><div class="nav-tab active">推荐</div>
  </div>
</nav>

<div class="scroll-container" id="container">
  
  <script>
    const videos = [
      "https://turquoise-absolute-cheetah-543.mypinata.cloud/ipfs/bafybeied7iqyfz7fo5tg6jumdcp53cezwlmvouazyt5sqj5nwlzohn7vxm",
      "https://turquoise-absolute-cheetah-543.mypinata.cloud/ipfs/bafybeihokl2aj6p2ftxwivc6ty6xg3zx3lu3bw2norvlyhdjmrkb4shaiq",
      "https://turquoise-absolute-cheetah-543.mypinata.cloud/ipfs/bafybeifkqtkjlgcfs6ikmkc5cc6psr23hhuz2kgy62teikohlas63prqou",
      "https://turquoise-absolute-cheetah-543.mypinata.cloud/ipfs/bafybeidsgny5mif27lqu7bt5z7g4a63raoxwjhslhmmegzwhljgjd3iggq",
      "https://turquoise-absolute-cheetah-543.mypinata.cloud/ipfs/bafybeiexn5pzogmujgmvwnmzdqw2axyh3s3ixumjlabcei4vbw35abyvhe",
      "https://turquoise-absolute-cheetah-543.mypinata.cloud/ipfs/bafybeidifsdf3xpabcrkypgu4c77i7pmgdru4iea2zus6rlbw6vfjfzvvy",
      "https://turquoise-absolute-cheetah-543.mypinata.cloud/ipfs/bafybeibafjebhoq6xh3esnbs6w2mao4cun4qfslruyaozgx54wgbjfbxoe",
      "https://turquoise-absolute-cheetah-543.mypinata.cloud/ipfs/bafybeidbpdoz4mtbk45wisqvcwgdewao4obuvwo2s5narprsr7rypsd76u",
      "https://turquoise-absolute-cheetah-543.mypinata.cloud/ipfs/bafybeifskd2zsnlquiyp4bdv2q2b2rzukscpr6lurer75buhy6qgb545ea",
      "https://turquoise-absolute-cheetah-543.mypinata.cloud/ipfs/bafybeie53svjmqhznjlosvlkvtu7cckzrgwexo3h2ljvartpuhzsr3kdki"
    ];

    const container = document.getElementById('container');
    videos.forEach((src, index) => {
      container.innerHTML += `
        <div class="video-section">
          <video class="main-video" loop playsinline src="${src}"></video>
          
          <div class="side-bar">
            <div class="avatar-wrap"><div class="avatar-img"></div><div class="avatar-plus">+</div></div>
            <div class="side-btn"><div class="icon-wrap"><svg width="36" height="36" viewBox="0 0 24 24" fill="#fff"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></div><span class="label">点赞</span></div>
            <div class="side-btn"><div class="icon-wrap"><svg width="32" height="32" viewBox="0 0 24 24" fill="#fff"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div><span class="label">评论</span></div>
            <div class="side-btn"><div class="icon-wrap"><svg width="32" height="32" viewBox="0 0 24 24" fill="#fff"><path d="M14 4.5V1l7 7-7 7v-4.1c-5 0-8.5 1.6-11 5.1 1-5 4-10 11-11z"/></svg></div><span class="label">分享</span></div>
          </div>

          <div class="video-info">
            <div class="vi-username">@Pinata视频_${index + 1}</div>
            <div class="vi-desc">全屏同步UI，点击屏幕开启全屏体验 ✨</div>
          </div>
        </div>
      `;
    });
  </script>
</div>

<div class="tab-bar">
  <div class="tab-item active">首页</div>
  <div class="tab-item">朋友</div>
  <div class="tab-item"><div class="pub-btn"><div class="pub-inner">+</div></div></div>
  <div class="tab-item">消息</div>
  <div class="tab-item">我</div>
</div>

<script>
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const v = entry.target.querySelector('video');
      if (entry.isIntersecting) {
        v.play().catch(() => {});
      } else {
        v.pause();
        v.currentTime = 0;
      }
    });
  }, { threshold: 0.6 });

  document.querySelectorAll('.video-section').forEach(s => observer.observe(s));

  // 触发全屏
  document.addEventListener('touchstart', () => {
    const doc = document.documentElement;
    if (doc.requestFullscreen) doc.requestFullscreen();
    else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
  }, { once: true });
</script>

</body>
</html>
