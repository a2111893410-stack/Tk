export default {
  async fetch(request) {
    const ua = request.headers.get("user-agent") || "";

    const isQQ = /QQBrowser|MQQBrowser/i.test(ua);

    const url = new URL(request.url);

    // QQ浏览器 → 兼容页面
    if (isQQ) {
      return fetch("https:/kefu.html");
    }

    // 其他浏览器 → 正常页面
    return fetch("https://indexx.html");
  }
};
